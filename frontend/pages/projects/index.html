<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการโปรเจกต์</title>
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
  <nav>
    <a href="../../index.html">หน้าแรก</a>
    <a href="../users/">ผู้ใช้</a>
    <a href="../projects/" class="active">โปรเจกต์</a>
    <a href="../tasks/">งาน</a>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="page-title">โปรเจกต์</div>
    </div>

    <div class="form-card" id="form-section">
      <div class="section-label">สร้าง / แก้ไขโปรเจกต์</div>

      <div class="form-row">
        <label class="form-label">ชื่อโปรเจกต์</label>
        <input class="form" id="name" type="text" placeholder="ชื่อโปรเจกต์">
      </div>
      <div class="form-row">
        <label class="form-label">รายละเอียด</label>
        <input class="form" id="description" type="text" placeholder="รายละเอียดโปรเจกต์">
      </div>
      <div class="form-row">
        <label class="form-label">เจ้าของโปรเจกต์</label>
        <select id="user_id" class="form">
          <option value="">— เลือกผู้ใช้ —</option>
        </select>
      </div>

      <div id="message" class="message"></div>

      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
        <button onclick="cancelEdit()" class="button button-secondary" id="cancel-btn" style="display:none;">ยกเลิก</button>
        <button onclick="submitData()" class="button button-primary" id="submit-btn">+ สร้างโปรเจกต์</button>
      </div>
    </div>

    <div class="section-label">รายการโปรเจกต์</div>
    <div id="projects"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="./index.js"></script>
</body>
</html>
