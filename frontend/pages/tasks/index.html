<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการงาน</title>
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
  <nav>
    <a href="../../index.html">หน้าแรก</a>
    <a href="../users/">ผู้ใช้</a>
    <a href="../projects/">โปรเจกต์</a>
    <a href="../tasks/" class="active">งาน</a>
  </nav>

  <div class="container">
    <div class="page-header">
      <div class="page-title">งาน</div>
    </div>

    <div class="form-card">
      <div class="section-label">สร้าง / แก้ไขงาน</div>

      <div class="form-row">
        <label class="form-label">ชื่องาน</label>
        <input class="form" id="title" type="text" placeholder="ชื่องาน">
      </div>
      <div class="form-row">
        <label class="form-label">รายละเอียด</label>
        <input class="form" id="description" type="text" placeholder="รายละเอียด">
      </div>
      <div class="form-row">
        <label class="form-label">สถานะ</label>
        <select id="status" class="form">
          <option value="todo">Todo</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">โปรเจกต์</label>
        <select id="project_id" class="form">
          <option value="">— เลือกโปรเจกต์ —</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">ผู้รับผิดชอบ</label>
        <select id="assigned_user_id" class="form">
          <option value="">— ไม่ระบุ —</option>
        </select>
      </div>

      <div id="message" class="message"></div>

      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
        <button onclick="cancelEdit()" class="button button-secondary" id="cancel-btn" style="display:none;">ยกเลิก</button>
        <button onclick="submitData()" class="button button-primary" id="submit-btn">+ สร้างงาน</button>
      </div>
    </div>

    <div class="section-label">รายการงาน</div>
    <div id="tasks"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="./index.js"></script>
</body>
</html>
